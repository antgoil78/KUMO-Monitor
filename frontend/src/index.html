<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Fullstack Docker App</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <p class="eyebrow">Docker test app</p>
        <h1>Frontend + Flask backend fungerar</h1>
        <p>
          Denna minimala app är byggd för att verifiera att Dockerfile, build context,
          frontend-build och backend-start fungerar från en komplett katalogstruktur.
        </p>

        <div class="actions">
          <button id="checkHealth">Testa backend</button>
          <button id="checkConfig" class="secondary">Kontrollera Snowflake-env</button>
        </div>

        <pre id="output">Klicka på en knapp för att anropa backend.</pre>
      </section>
    </main>
    <script src="/static/js/app.js"></script>
  </body>
</html>
